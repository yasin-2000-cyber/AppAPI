apiVersion: v2
name: app-api
description: FastAPI application with PostgreSQL and Redis
type: application
version: 0.1.0
appVersion: "1.0.0"
dependencies:
  - name: postgresql
    version: "16.4.4"
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: postgresql.enabled
  - name: redis
    version: "20.6.3"
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: redis.enabled
