apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-demo
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/yasin-2000-cyber/AppAPI.git
    targetRevision: HEAD
    path: charts/firstchart

  destination:
    server: https://kubernetes.default.svc
    namespace: app-demo

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true