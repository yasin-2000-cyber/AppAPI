apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "app-api.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "app-api.labels" . | nindent 4 }}
spec:
  ingressClassName: nginx
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "app-api.name" . }}
                port:
                  number: {{ .Values.service.port }}
