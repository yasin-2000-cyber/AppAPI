replicaCount: 1

image:
  repository: yasin313/appapi
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

app:
  message: "connected to DB successfully"

postgresql:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
  # For chart 18.5.2, the default app version is 17.2.0. 
  # You should use an "immutable" tag found in the legacy repo.
    tag: 17.2.0-debian-12-r0
  auth:
    username: appuser
    password: apppass
    database: appdb
  primary:
    service:
      ports:
        postgresql: 5432

redis:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/redis
  # Example: Use a stable versioned tag from the legacy repo
    tag: 7.4.1-debian-12-r2
  architecture: standalone
  auth:
    enabled: false
  master:
    service:
      ports:
        redis: 6379

resources: {}

nodeSelector: {}

tolerations: []

affinity: {}
