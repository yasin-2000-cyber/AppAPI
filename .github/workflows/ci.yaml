name: build-publish-image-and-chart

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: yasin313/yasin-dev-test
  CHART_NAME: firstchart
  CHART_DIR: charts/firstchart
  APP_DIR: app

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute versions
        id: meta
        run: |
          echo "image_tag=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "chart_version=0.1.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "app_version=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to Helm OCI registry
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | helm registry login registry-1.docker.io \
            --username "${{ secrets.DOCKERHUB_USERNAME }}" \
            --password-stdin

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}

      - name: Update app image values only
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
          CHART_DIR: ${{ env.CHART_DIR }}
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os
          import re

          values_file = Path(os.environ["CHART_DIR"]) / "values.yaml"
          text = values_file.read_text()

          image_name = os.environ["IMAGE_NAME"]
          image_tag = os.environ["IMAGE_TAG"]

          image_block_pattern = r'(?ms)(^image:\n(?:^[ \t].*\n)*)'
          match = re.search(image_block_pattern, text)
          if not match:
              raise SystemExit("Could not find top-level image block in values.yaml")

          block = match.group(1)
          block = re.sub(r'(?m)^(\s*repository:\s*).*$',
                         rf'\1{image_name}',
                         block)
          block = re.sub(r'(?m)^(\s*tag:\s*).*$',
                         rf'\1"{image_tag}"',
                         block)

          text = text[:match.start(1)] + block + text[match.end(1):]
          values_file.write_text(text)
          PY

      - name: Build Helm dependencies
        run: helm dependency build ${{ env.CHART_DIR }}

      - name: Package Helm chart
        run: |
          mkdir -p dist
          helm package ${{ env.CHART_DIR }} \
            --version "${{ steps.meta.outputs.chart_version }}" \
            --app-version "${{ steps.meta.outputs.app_version }}" \
            --destination dist

      - name: Push Helm chart to OCI
        run: |
          helm push "dist/${{ env.CHART_NAME }}-${{ steps.meta.outputs.chart_version }}.tgz" \
            oci://registry-1.docker.io/yasin313