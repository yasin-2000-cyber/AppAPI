name: build-publish-image-and-chart

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: yasin313/yasin-dev-test
  CHART_NAME: firstchart
  CHART_DIR: charts/firstchart
  APP_DIR: app

jobs:
  docker:
    runs-on: ubuntu-latest
    outputs:
      run_number: ${{ steps.meta.outputs.run_number }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
      chart_version: ${{ steps.meta.outputs.chart_version }}
      app_version: ${{ steps.meta.outputs.app_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute versions
        id: meta
        run: |
          echo "run_number=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "chart_version=0.1.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "app_version=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}

  helm:
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Update chart and values versions
        env:
          CHART_VERSION: ${{ needs.docker.outputs.chart_version }}
          APP_VERSION: ${{ needs.docker.outputs.app_version }}
          IMAGE_TAG: ${{ needs.docker.outputs.image_tag }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          CHART_DIR: ${{ env.CHART_DIR }}
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os
          import re

          chart_file = Path(os.environ["CHART_DIR"]) / "Chart.yaml"
          values_file = Path(os.environ["CHART_DIR"]) / "values.yaml"

          chart_version = os.environ["CHART_VERSION"]
          app_version = os.environ["APP_VERSION"]
          image_tag = os.environ["IMAGE_TAG"]
          image_name = os.environ["IMAGE_NAME"]

          chart_text = chart_file.read_text()

          chart_text = re.sub(r'(?m)^version:\s*.*$', f'version: {chart_version}', chart_text)
          chart_text = re.sub(r'(?m)^appVersion:\s*.*$', f'appVersion: "{app_version}"', chart_text)

          chart_file.write_text(chart_text)

          values_text = values_file.read_text()

          values_text = re.sub(
              r'(?m)^(\s*repository:\s*).*$',
              rf'\1{image_name}',
              values_text,
              count=1
          )
          values_text = re.sub(
              r'(?m)^(\s*tag:\s*).*$',
              rf'\1"{image_tag}"',
              values_text,
              count=1
          )

          values_file.write_text(values_text)
          PY

      - name: Build Helm dependencies
        run: helm dependency build ${{ env.CHART_DIR }}

      - name: Package Helm chart
        run: |
          mkdir -p dist
          helm package ${{ env.CHART_DIR }} \
            --version "${{ needs.docker.outputs.chart_version }}" \
            --app-version "${{ needs.docker.outputs.app_version }}" \
            --destination dist

      - name: Log in to Docker Hub OCI registry
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | helm registry login registry-1.docker.io \
            --username "${{ secrets.DOCKERHUB_USERNAME }}" \
            --password-stdin

      - name: Push Helm chart to OCI
        run: |
          helm push dist/${{ env.CHART_NAME }}-${{ needs.docker.outputs.chart_version }}.tgz \
            oci://registry-1.docker.io/yasin313

      - name: Show published artifacts
        run: |
          echo "Docker image pushed first:"
          echo "${{ env.IMAGE_NAME }}:${{ needs.docker.outputs.image_tag }}"
          echo "Then chart pushed:"
          echo "oci://registry-1.docker.io/yasin313/${{ env.CHART_NAME }}:${{ needs.docker.outputs.chart_version }}"
