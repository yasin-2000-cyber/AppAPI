apiVersion: v2
name: firstchart
description: Helm chart for AppAPI with PostgreSQL and Redis dependencies
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: postgresql
    version: 18.5.2
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: postgresql.enabled
  - name: redis
    version: 20.2.1
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: redis.enabled